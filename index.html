<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Стартовая панель | быстрые редиректы</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0c15;
            font-family: 'Quicksand', 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 70% 20%, rgba(70, 50, 140, 0.25), transparent 70%);
            pointer-events: none;
        }

        .dashboard {
            max-width: 1300px;
            width: 100%;
            background: rgba(10, 12, 21, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .greeting {
            text-align: center;
            margin-bottom: 3rem;
        }

        .greeting h1 {
            font-size: 2.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e0e7ff, #b9a9f0, #7b9eff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .greeting p {
            color: #9aa9c7;
            font-size: 1.15rem;
            margin-top: 0.6rem;
            font-weight: 500;
        }

        .grid-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.8rem;
            margin: 1rem 0 1rem;
        }

        .redirect-card {
            background: rgba(18, 22, 35, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.8rem 0.8rem;
            text-align: center;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            transition: transform 0.25s ease, background 0.2s, box-shadow 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            cursor: pointer;
        }

        .redirect-card i {
            font-size: 3.7rem;
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.4));
        }

        .card-title {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 0.3px;
            background: linear-gradient(145deg, #ffffff, #cbd5ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .card-sub {
            font-size: 0.8rem;
            color: #8b97b5;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.4);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
        }

        .card-pinterest i { color: #E60023; }
        .card-google i { color: #F4B400; }
        .card-youtube i { color: #FF0000; }
        .card-github i { color: #f0f6fc; }
        .card-duckduckgo i { color: #DE5833; }

        .redirect-card:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(28, 34, 54, 0.98);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(200, 180, 250, 0.2);
        }

        .redirect-card:hover i {
            transform: scale(1.08) rotate(1deg);
        }

        .redirect-card:active {
            transform: translateY(2px) scale(0.98);
            transition: 0.05s;
        }

        .info-footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.85rem;
            color: #6a7390;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            padding-top: 1.8rem;
            display: flex;
            justify-content: center;
            gap: 1.8rem;
            flex-wrap: wrap;
        }

        .info-footer span {
            background: rgba(0, 0, 0, 0.4);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-weight: 500;
        }

        .info-footer i {
            margin-right: 6px;
            font-size: 0.85rem;
        }

        @media (max-width: 680px) {
            body {
                padding: 1rem;
            }
            .dashboard {
                padding: 1.5rem;
            }
            .greeting h1 {
                font-size: 1.8rem;
            }
            .grid-links {
                gap: 1.2rem;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
            .redirect-card {
                padding: 1.2rem 0.5rem;
            }
            .redirect-card i {
                font-size: 2.8rem;
            }
            .card-title {
                font-size: 1.2rem;
            }
        }

        .redirect-card {
            animation: cardFadeUp 0.4s ease backwards;
        }

        @keyframes cardFadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .redirect-card:nth-child(1) { animation-delay: 0.05s; }
        .redirect-card:nth-child(2) { animation-delay: 0.1s; }
        .redirect-card:nth-child(3) { animation-delay: 0.15s; }
        .redirect-card:nth-child(4) { animation-delay: 0.2s; }
        .redirect-card:nth-child(5) { animation-delay: 0.25s; }

        a:focus-visible {
            outline: 3px solid #a27be0;
            outline-offset: 4px;
            border-radius: 2rem;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="greeting">
        <h1>навигатор быстрых редиректов</h1>
        <p>кликни — и откроется нужный сервис | твоя стартовая панель</p>
    </div>

    <div class="grid-links">
        <a href="https://www.pinterest.com" class="redirect-card card-pinterest" target="_self" rel="noopener noreferrer">
            <i class="fab fa-pinterest"></i>
            <span class="card-title">Pinterest</span>
            <span class="card-sub">вдохновение и идеи</span>
        </a>

        <a href="https://www.google.com" class="redirect-card card-google" target="_self" rel="noopener noreferrer">
            <i class="fab fa-google"></i>
            <span class="card-title">Google</span>
            <span class="card-sub">поиск и сервисы</span>
        </a>

        <a href="https://www.youtube.com" class="redirect-card card-youtube" target="_self" rel="noopener noreferrer">
            <i class="fab fa-youtube"></i>
            <span class="card-title">YouTube</span>
            <span class="card-sub">видео и музыка</span>
        </a>

        <a href="https://github.com" class="redirect-card card-github" target="_self" rel="noopener noreferrer">
            <i class="fab fa-github"></i>
            <span class="card-title">GitHub</span>
            <span class="card-sub">код и open source</span>
        </a>

        <a href="https://duckduckgo.com" class="redirect-card card-duckduckgo" target="_self" rel="noopener noreferrer">
            <i class="fab fa-duckduckgo"></i>
            <span class="card-title">DuckDuckGo</span>
            <span class="card-sub">приватный поиск</span>
        </a>
    </div>

    <div class="info-footer">
        <span><i class="fas fa-compass"></i> редиректы в текущей вкладке</span>
        <span><i class="fas fa-firefox-browser"></i> стартовая страница Firefox</span>
        <span><i class="fas fa-mouse-pointer"></i> наведись + анимация</span>
    </div>
</div>

<script>
    const cards = document.querySelectorAll('.redirect-card');
    cards.forEach(card => {
        card.addEventListener('click', (e) => {
            card.style.transition = 'transform 0.07s ease';
            card.style.transform = 'scale(0.97)';
            setTimeout(() => {
                card.style.transform = '';
                setTimeout(() => {
                    card.style.transition = '';
                }, 50);
            }, 90);
        });
    });
</script>
</body>
</html>
